server:
  port: 8080

spring:
  application:
    name: store-maintenance-request-system

  datasource:
    url: jdbc:postgresql://localhost:5432/maintenance_requests_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

jwt:
  secret: my-super-secret-jwt-key-for-store-maintenance-system-2026
  expiration-ms: 86400000
